[project]
name = "d2l-ai-api"
version = "0.1.0"
description = "Brightspace API integration components"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=43.0.0",
    "fastapi>=0.115.0",
    "httpx>=0.27.0",
    "pydantic>=2.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
